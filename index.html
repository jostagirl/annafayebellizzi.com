<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This space is spoken for</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #eef2ef, #dfe7e1);
      font-family: 'Inter', sans-serif;
      color: #2e3a34;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-weight: 500;
      font-size: 1.9rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin: 10px 0;
    }

    .line {
      width: 50px;
      height: 2px;
      background: #6f8a7a;
      margin: 25px auto;
      border-radius: 2px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      opacity: 0.7;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>This domain is spoken for.</h1>

    <div class="line"></div>

    <p>A real person will be here someday.</p>
    <p>Until then, this space is held and waiting.</p>

    <div class="line"></div>

    <div class="footer">Claimed in 2026</div>
  </div>
</body>
</html>
