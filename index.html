<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This space is spoken for</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      /* softer sky + earth + fresh green */
      background: linear-gradient(to bottom, #e8f4f8, #f4f7f2);

      font-family: 'Poppins', sans-serif;
      color: #2f3b35;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-weight: 500;
      font-size: 1.9rem;
      margin-bottom: 20px;
      letter-spacing: 0.2px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin: 10px 0;
      color: #3a4a42;
    }

    .line {
      width: 60px;
      height: 2px;
      margin: 25px auto;
      border-radius: 2px;

      /* soft forest green accent */
      background: linear-gradient(to right, #6f9e8b, #9ccbb7);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      opacity: 0.75;
      letter-spacing: 0.05em;
      color: #4b5b54;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>This domain is spoken for.</h1>

    <div class="line"></div>

    <p>A real person will be here someday.</p>
    <p>Until then, this space is held and waiting.</p>

    <div class="line"></div>

    <div class="footer">Claimed in 2024</div>
  </div>
</body>
</html>
